plugins {
  id 'com.android.library'
  id 'expo-module-gradle-plugin'
}

group = 'com.katkut.videopreview'
version = '0.1.0'

android {
  namespace "com.katkut.videopreview"
  defaultConfig {
    versionCode 1
    versionName "0.1.0"
  }
  lintOptions {
    abortOnError false
  }
}

dependencies {
  // Match the Media3 version expo-video pulls in, to avoid a duplicate/conflicting ExoPlayer.
  def media3Version = "1.9.0"
  implementation "androidx.media3:media3-exoplayer:${media3Version}"
  implementation "androidx.media3:media3-ui:${media3Version}"
  implementation "androidx.media3:media3-common:${media3Version}"
}
